name: "[CI] MySqli"

on:
  push:
    #branches: [main]
    paths:
      - 'src/Instrumentation/MySqli/**'

  pull_request:
    paths:
      - 'src/Instrumentation/MySqli/**'

  # To call from https://github.com/opentelemetry-php/contrib-auto-mysqli repo/forks.
  workflow_call:
    inputs:
      package-root:
        type: string
        required: true

jobs:
  CI:
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - 8.2
          - 8.3
          - 8.4

    uses: ./.github/workflows/php-contrib.yml
    with:
      job-name: "PHP ${{ matrix.php-version }}"
      codecov-flags: 'Instrumentation/MySqli'
      package-root: ${{ inputs.package-root || 'src/Instrumentation/MySqli' }}
      php-version: ${{ matrix.php-version }}
      services: '["mysql"]'
