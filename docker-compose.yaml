services:
  php:
    # the developer image comes from opentelemetry-php (the core repository), and is built by github actions
    image: ghcr.io/open-telemetry/opentelemetry-php/opentelemetry-php-base:${PHP_VERSION}
    volumes:
    - ./:/usr/src/myapp
    user: "${PHP_USER}:root"
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-''}
      PHP_IDE_CONFIG: ${PHP_IDE_CONFIG:-''}
      RABBIT_HOST: ${RABBIT_HOST:-rabbitmq}
      KAFKA_HOST: ${KAFKA_HOST:-kafka}
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      POSTGRESQL_HOST: ${POSTGRESQL_HOST:-postgresql}

  zipkin:
    image: openzipkin/zipkin-slim@sha256:fc29b9862c14f4fc241cf0259c585e1cfd4e9b18f01ad36d86adaabb7d01815c
    ports:
    - 9411:9411
  jaeger:
    image: jaegertracing/all-in-one@sha256:ab6f1a1f0fb49ea08bcd19f6b84f6081d0d44b364b6de148e1798eb5816bacac
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: 9412
    ports:
    - 9412:9412
    - 16686:16686

  collector:
    image: otel/opentelemetry-collector-contrib@sha256:d57bfe8eee2378f31cb1193239fbcac521d54a5a071fca2bfc106916a32b892d # 0.151.0
    command: [ "--config=/etc/otel-collector-config.yml" ]
    volumes:
      - ./files/collector/otel-collector-config.yml:/etc/otel-collector-config.yml

  rabbitmq:
    image: rabbitmq:3@sha256:87178a0ee3e2f52980ba356d38646ed1056705ff2d5ff281f8965456eaa0c1e3
    hostname: rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3
    ports:
      - "5672:5672/tcp"
  kafka:
    image: confluentinc/cp-kafka:7.9.6@sha256:9e178783dba8cf44cd8b1d260f548a587a21235921957edd4ed7aa7d060b0852
    hostname: kafka
    ports:
      - "9092:9092/tcp"
    environment:
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    command: "bash -c '/tmp/update_run.sh && /etc/confluent/docker/run'"
    volumes:
      - ./docker/kafka/update_run.sh:/tmp/update_run.sh

  mongodb:
    image: mongo:4@sha256:52c42cbab240b3c5b1748582cc13ef46d521ddacae002bbbda645cebed270ec0
    hostname: mongodb
    ports:
      - "27017:27017/tcp"

  mysql:
    image: mysql:8.0@sha256:d0304ed9fdb64a3f6c7ad11a5fb4f13abfc10e6dfa3f288d652e7320c34df7f9
    hostname: mysql
    ports:
      - "3306:3306/tcp"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: otel_db
      MYSQL_USER: otel_user
      MYSQL_PASSWORD: otel_passwd
    healthcheck:
      test: mysql -uotel_user -potel_passwd -e "USE otel_db;"
      interval: 30s
      timeout: 30s
      retries: 3
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  postgresql:
    image: postgres:17.9@sha256:5b96f1a16bd9768b060dd2ffe55cb6225c4d9ef4d214a8b21eb08134869a97e4
    hostname: postgresql
    ports:
      - "5432:5432/tcp"
    environment:
      POSTGRES_DB: otel_db
      POSTGRES_USER: otel_user
      POSTGRES_PASSWORD: otel_passwd
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=otel_passwd psql -U otel_user -d otel_db -h 127.0.0.1 -c 'SELECT 1'"]
      interval: 30s
      timeout: 90s
      retries: 3
    volumes:
      - ./docker/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
